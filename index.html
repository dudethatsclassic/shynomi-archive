<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shynomi's Live Archive</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="site-header">
    <div class="container">
      <div class="inner">
        <a class="site-logo" href="./index.html">Shynomi's Live<span>Archive</span></a>
      </div>
    </div>
  </header>

  <main>
    <div class="home-intro">
      <div class="container">
        <p>A personal collection of live recordings</p>
        <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; align-items: center;">
          <a href="search.html" class="home-btn-gold">Search all shows →</a>
          <button class="home-btn-gold" id="artist-search-btn" onclick="toggleArtistSearch()">Search all artists →</button>
        </div>
        <div id="artist-search-wrap" style="display:none; margin-top: 16px;">
          <input id="artist-search-input" type="text" placeholder="Type an artist name…" class="artist-search-input" oninput="filterArtists(this.value)" autofocus />
        </div>
      </div>
    </div>

    <div class="container">
      <div class="section-header-row">
        <h1 class="section-title">Featured Artists</h1>
      </div>
      <div class="artist-grid" id="featured-grid"></div>
    </div>

    <div class="container" style="margin-top: 32px; margin-bottom: 64px; text-align: center;">
      <button id="other-toggle" class="other-artists-btn" onclick="toggleOther()">
        Other Artists <span id="other-arrow">↓</span>
      </button>
    </div>

    <div class="container" id="other-section" style="display:none; margin-top: 32px;">
      <div class="section-header-row">
        <h2 class="section-title">Other Artists</h2>
      </div>
      <div class="artist-grid" id="other-grid"></div>
    </div>
  </main>

  <script src="data/artists.js"></script>
  <script src="js/logo.js"></script>
  <script>
    const FEATURED_IDS = [
      'counting-crows',
      'foo-fighters',
      'green-day',
      'incubus',
      'local-h',
      'metallica',
      'nirvana',
      'pearl-jam',
      'primus',
      'radiohead',
      'red-hot-chili-peppers',
      'ryan-adams',
      'smashing-pumpkins',
      'soundgarden',
      'tool',
      'weezer',
      'wilco',
    ];

    function makeCard(artist) {
      const card = document.createElement('a');
      card.href      = `artists/${artist.id}/`;
      card.className = 'artist-card';

      const initials = artist.name
        .split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 3);

      card.innerHTML = `
        <div class="artist-card-img-wrap">
          <div class="artist-card-placeholder" data-id="${artist.id}">${initials}</div>
          <span class="artist-card-count">${artist.showCount} shows</span>
        </div>
        <div class="artist-card-info">
          <div class="artist-card-name">${artist.name}</div>
          <div class="artist-card-meta">${artist.firstYear}&ndash;${artist.lastYear}</div>
        </div>`;

      const img = new Image();
      img.onload = () => {
        const ph = card.querySelector('.artist-card-placeholder');
        const photo = document.createElement('img');
        photo.className = 'artist-card-photo';
        photo.src = img.src;
        photo.alt = artist.name;
        if (ph) ph.replaceWith(photo);
      };
      img.src = `images/${artist.id}/band.jpg`;


      return card;
    }

    const featuredSet = new Set(FEATURED_IDS);
    const featuredGrid = document.getElementById('featured-grid');
    const otherGrid    = document.getElementById('other-grid');

    // Render featured in the defined order
    const artistMap = {};
    ARTISTS.forEach(a => { if (a.id) artistMap[a.id] = a; });

    FEATURED_IDS.forEach(id => {
      const artist = artistMap[id];
      if (artist) featuredGrid.appendChild(makeCard(artist));
    });

    // Render all others alphabetically
    ARTISTS
      .filter(a => a.id && !featuredSet.has(a.id))
      .forEach(a => otherGrid.appendChild(makeCard(a)));

    function toggleOther() {
      const section = document.getElementById('other-section');
      const arrow   = document.getElementById('other-arrow');
      const open    = section.style.display === 'none';
      section.style.display = open ? 'block' : 'none';
      arrow.textContent     = open ? '↑' : '↓';
      if (open) section.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function toggleArtistSearch() {
      const wrap  = document.getElementById('artist-search-wrap');
      const input = document.getElementById('artist-search-input');
      const open  = wrap.style.display === 'none';
      wrap.style.display = open ? 'block' : 'none';
      if (open) {
        input.value = '';
        filterArtists('');
        input.focus();
      } else {
        filterArtists(''); // reset on close
      }
    }

    // Search results container (injected once)
    const searchResultsGrid = document.createElement('div');
    searchResultsGrid.className = 'artist-grid';
    searchResultsGrid.id = 'search-results-grid';
    searchResultsGrid.style.marginTop = '0';

    const searchSection = document.createElement('div');
    searchSection.className = 'container';
    searchSection.id = 'search-results-section';
    searchSection.style.cssText = 'display:none; margin-top: 32px;';
    searchSection.appendChild(searchResultsGrid);
    document.querySelector('main').insertBefore(
      searchSection,
      document.querySelector('.container:nth-child(2)')
    );

    function filterArtists(query) {
      const q = query.trim().toLowerCase();
      const section = document.getElementById('search-results-section');
      const grid    = document.getElementById('search-results-grid');

      if (!q) {
        section.style.display = 'none';
        grid.innerHTML = '';
        return;
      }

      const matches = ARTISTS.filter(a => a.name && a.name.toLowerCase().includes(q));
      grid.innerHTML = '';
      matches.forEach(a => grid.appendChild(makeCard(a)));
      section.style.display = matches.length ? 'block' : 'none';

      if (matches.length === 0) {
        grid.innerHTML = '<p style="color:#888; padding: 12px 0;">No artists found.</p>';
        section.style.display = 'block';
      }
    }
  </script>

</body>
</html>
