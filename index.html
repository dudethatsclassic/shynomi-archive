<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shynomi's Live Archive</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="site-header">
    <div class="container">
      <div class="inner">
        <a class="site-logo" href="./index.html">Shynomi's Live<span>Archive</span></a>
      </div>
    </div>
  </header>

  <main>
    <div class="home-intro">
      <div class="container">
        <h1>Live Archive</h1>
        <p>A personal collection of live recordings</p>
        <div style="margin-top: 20px;">
          <a href="search.html" style="display: inline-block; padding: 10px 16px; background: rgba(201,151,60,0.12); border: 1px solid rgba(201,151,60,0.35); border-radius: 6px; color: #c9973c; font-size: 0.85rem; font-weight: 500; transition: all 0.15s ease;" onmouseover="this.style.background='rgba(201,151,60,0.2)'" onmouseout="this.style.background='rgba(201,151,60,0.12)'">
            Search all shows →
          </a>
        </div>
      </div>
    </div>

    <div class="container">
      <div class="artist-grid" id="featured-grid"></div>
    </div>

    <div class="container" style="margin-top: 48px;">
      <button id="other-toggle" class="other-artists-btn" onclick="toggleOther()">
        Other Artists <span id="other-arrow">↓</span>
      </button>
      <div id="other-grid-wrap" style="display:none; margin-top: 24px;">
        <div class="artist-grid" id="other-grid"></div>
      </div>
    </div>
  </main>

  <script src="data/artists.js"></script>
  <script src="js/logo.js"></script>
  <script>
    const FEATURED_IDS = [
      'counting-crows',
      'foo-fighters',
      'green-day',
      'incubus',
      'local-h',
      'metallica',
      'nirvana',
      'pearl-jam',
      'primus',
      'radiohead',
      'red-hot-chili-peppers',
      'ryan-adams',
      'smashing-pumpkins',
      'soundgarden',
      'tool',
      'weezer',
      'wilco',
    ];

    function makeCard(artist) {
      const card = document.createElement('a');
      card.href      = `artists/${artist.id}/`;
      card.className = 'artist-card';

      const initials = artist.name
        .split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 3);

      card.innerHTML = `
        <div class="artist-card-placeholder" data-id="${artist.id}">${initials}</div>
        <div class="artist-card-info">
          <div class="artist-card-name">${artist.name}</div>
          <div class="artist-card-meta">${artist.showCount} shows &middot; ${artist.firstYear}&ndash;${artist.lastYear}</div>
        </div>`;

      const img = new Image();
      img.onload = () => {
        const ph = card.querySelector('.artist-card-placeholder');
        const photo = document.createElement('img');
        photo.className = 'artist-card-photo';
        photo.src = img.src;
        photo.alt = artist.name;
        if (ph) ph.replaceWith(photo);
      };
      img.src = `images/${artist.id}/band.jpg`;

      return card;
    }

    const featuredSet = new Set(FEATURED_IDS);
    const featuredGrid = document.getElementById('featured-grid');
    const otherGrid    = document.getElementById('other-grid');

    // Render featured in the defined order
    const artistMap = {};
    ARTISTS.forEach(a => { if (a.id) artistMap[a.id] = a; });

    FEATURED_IDS.forEach(id => {
      const artist = artistMap[id];
      if (artist) featuredGrid.appendChild(makeCard(artist));
    });

    // Render all others alphabetically
    ARTISTS
      .filter(a => a.id && !featuredSet.has(a.id))
      .forEach(a => otherGrid.appendChild(makeCard(a)));

    function toggleOther() {
      const wrap  = document.getElementById('other-grid-wrap');
      const arrow = document.getElementById('other-arrow');
      const open  = wrap.style.display === 'none';
      wrap.style.display = open ? 'block' : 'none';
      arrow.textContent  = open ? '↑' : '↓';
    }
  </script>

</body>
</html>
