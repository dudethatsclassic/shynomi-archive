<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search – Shynomi's Live Archive</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .search-container { padding: 40px 0; }
    .search-input-wrapper {
      position: relative;
      margin-bottom: 32px;
    }
    .search-input {
      width: 100%;
      padding: 12px 16px;
      font-size: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
    }
    .search-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .search-results { margin-bottom: 40px; }
    .search-results-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .search-result-item {
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-details { flex: 1; }
    .search-result-date {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .search-result-venue {
      font-size: 0.9rem;
      font-weight: 500;
      line-height: 1.3;
    }
    .search-result-artist {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .search-result-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .search-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }
    .search-empty-title { font-size: 1rem; margin-bottom: 8px; }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="container">
      <div class="inner">
        <a class="site-logo" href="/">Shynomi's Live<span>Archive</span></a>
      </div>
    </div>
  </header>

  <main>
    <div class="search-container">
      <div class="container">
        <div class="search-input-wrapper">
          <input
            type="text"
            class="search-input"
            id="search-input"
            placeholder="Search by venue, city, artist, taper, or gear..."
            autofocus
          >
        </div>
        <div id="search-results"></div>
      </div>
    </div>
  </main>

  <script src="data/artists.js"></script>
  <script src="data/all-shows.js"></script>
  <script src="js/logo.js"></script>
  <script>
    document.querySelector('.site-logo').outerHTML = getLogo('/');
    const searchInput = document.getElementById('search-input');
    const resultsContainer = document.getElementById('search-results');

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function performSearch(query) {
      if (!query.trim()) {
        resultsContainer.innerHTML = '';
        return;
      }

      const q = query.toLowerCase();
      const matches = ALL_SHOWS.filter(show =>
        show.venue.toLowerCase().includes(q) ||
        show.location.toLowerCase().includes(q) ||
        show.artist.toLowerCase().includes(q) ||
        show.taper.toLowerCase().includes(q) ||
        show.gear.toLowerCase().includes(q)
      );

      if (matches.length === 0) {
        resultsContainer.innerHTML = `
          <div class="search-empty">
            <div class="search-empty-title">No results found</div>
            <p>Try searching for a venue, city, artist, taper, or gear type.</p>
          </div>`;
        return;
      }

      const resultsHtml = matches.map(show => `
        <div class="search-result-item">
          <div class="search-result-details">
            <div class="search-result-venue">${escapeHtml(show.venue)}</div>
            <div class="search-result-artist">${escapeHtml(show.artist)}</div>
            <div class="search-result-meta">
              ${show.gear ? `Gear: ${escapeHtml(show.gear)} · ` : ''}
              ${show.taper ? `Taper: ${escapeHtml(show.taper)}` : ''}
            </div>
          </div>
          <div class="search-result-date">${escapeHtml(show.date)}</div>
        </div>`
      ).join('');

      resultsContainer.innerHTML = `
        <div class="search-results">
          <div class="search-results-title">${matches.length} result${matches.length !== 1 ? 's' : ''}</div>
          ${resultsHtml}
        </div>`;
    }

    searchInput.addEventListener('input', (e) => {
      performSearch(e.target.value);
    });
  </script>

</body>
</html>
